<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>REBUILD° — Training Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&family=Oswald:ital,wght@0,400;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
:root{
  --paper:#F1ECDF;--paper2:#E3DCC8;--ink:#2A1708;--ink2:#4A3020;
  --sky:#2E7CFF;--fire:#FF6B47;--fire2:#E34A22;--rule:#C8BEA7;
}
body{background:var(--ink);color:var(--ink);font-family:"Archivo Narrow","Helvetica Neue",sans-serif;font-weight:700;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* HEADER */
#appHeader{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:2px solid var(--ink)}
.hdr-dateline{display:flex;justify-content:space-between;align-items:center;padding:10px 18px 4px;font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--ink2);font-weight:700}
.hdr-wordmark{font-family:"Oswald",sans-serif;font-weight:700;font-style:italic;font-size:58px;color:var(--sky);line-height:.82;letter-spacing:-.04em;padding:0 18px 10px;text-align:center;overflow:hidden}
.hdr-wordmark span{color:var(--fire);font-style:normal}
.hdr-tagline{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.34em;text-align:center;color:var(--ink);padding:0 0 10px;font-weight:700}
.hdr-rule{height:2px;background:var(--ink)}
.hdr-rule-thin{height:1px;background:var(--ink)}
.week-rail{display:grid;grid-template-columns:repeat(6,1fr)}
.wk-btn{appearance:none;cursor:pointer;border:0;background:var(--paper);color:var(--ink);padding:7px 0 5px;font-family:"Oswald",sans-serif;font-size:20px;font-weight:700;border-right:1px solid var(--ink);display:flex;flex-direction:column;align-items:center;gap:0;transition:background .12s}
.wk-btn:last-child{border-right:none}
.wk-btn.active{background:var(--sky);color:var(--paper)}
.wk-sub{font-family:"JetBrains Mono",monospace;font-size:7px;letter-spacing:.18em;font-weight:400;margin-bottom:1px;text-transform:uppercase}
.day-tabs{display:grid;grid-template-columns:repeat(6,1fr)}
.day-btn{appearance:none;cursor:pointer;border:0;background:transparent;color:var(--ink);padding:7px 2px 5px;border-right:1px solid var(--rule);display:flex;flex-direction:column;align-items:center;gap:1px;transition:background .12s}
.day-btn:last-child{border-right:none}
.day-btn.active{background:var(--ink)}
.day-lbl{font-family:"Oswald",sans-serif;font-size:17px;font-weight:700;line-height:1;color:var(--ink)}
.day-btn.active .day-lbl{color:var(--fire)}
.day-sub{font-family:"JetBrains Mono",monospace;font-size:6px;letter-spacing:.14em;color:var(--ink2)}
.day-btn.active .day-sub{color:var(--paper)}

/* MAIN */
#appMain{background:var(--paper);padding-bottom:60px}

/* PHASE DOSSIER */
.phase-dossier{background:var(--ink);color:var(--paper);padding:26px 22px 22px;border-bottom:2px solid var(--ink)}
.phase-eye{display:flex;justify-content:space-between;align-items:baseline;font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--paper);letter-spacing:.22em;margin-bottom:6px;opacity:.6;font-weight:700}
.phase-heading{font-family:"Oswald",sans-serif;font-size:64px;color:var(--paper);line-height:.82;letter-spacing:-.04em;font-style:italic;font-weight:700;text-transform:uppercase}
.ph-sky{color:var(--sky)}
.ph-fire{color:var(--fire);font-style:normal}
.phase-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.phase-pill{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.18em;padding:4px 12px}
.pill-rpe{background:var(--fire);color:var(--paper)}
.pill-focus{border:1px solid var(--paper);color:var(--paper)}
.deload-notice{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.16em;color:var(--fire);margin-top:10px;font-weight:700}

/* PREHAB */
.prehab-wrap{padding:20px 22px 10px;border-bottom:1px solid var(--ink)}
.prehab-toggle{appearance:none;cursor:pointer;border:0;background:transparent;width:100%;padding:0 0 10px;display:flex;justify-content:space-between;align-items:baseline;color:var(--ink)}
.prehab-toggle-label{display:flex;gap:10px;align-items:baseline}
.prehab-marker{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--fire);letter-spacing:.22em;font-weight:700;display:inline-block;min-width:34px}
.prehab-title{font-family:"Oswald",sans-serif;font-size:22px;color:var(--ink);font-weight:700;text-transform:uppercase}
.prehab-icon{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink2)}
.prehab-body{display:none;border-top:1px solid var(--rule)}
.prehab-body.open{display:block}
.pb-block-head{font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--ink2);text-transform:uppercase;padding:18px 0 8px;border-bottom:1px solid var(--ink);margin-top:6px}
.pb-ex-row{display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center;padding:16px 0;border-bottom:1px dotted var(--rule)}
.pb-ex-row:last-child{border-bottom:none}
.pb-num{font-family:"Oswald",sans-serif;font-size:44px;color:var(--sky);line-height:.85;font-style:italic;letter-spacing:-.04em;font-weight:700}
.pb-ex-info{display:flex;flex-direction:column;gap:4px;min-width:0}
.pb-name{font-size:16px;color:var(--ink);font-weight:700;line-height:1.2}
.pb-reps{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--fire);font-weight:700;letter-spacing:.12em;white-space:nowrap}

/* VIDEO BTN */
.vid-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:30px;padding:0 10px;background:var(--fire);color:var(--paper);border:0;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;flex-shrink:0;border-radius:0}
.vid-sm{width:34px;height:30px;padding:0}

/* SECTION NOTE */
.sec-note{font-size:12px;font-style:italic;font-weight:400;color:var(--ink2);line-height:1.5;padding:10px 22px 0}

/* STRENGTH WRAPPER (collapsible) */
.strength-wrap{background:var(--paper);border-bottom:1px solid var(--ink)}
.strength-body .sec-note{color:var(--paper);opacity:.7}
.strength-toggle{appearance:none;cursor:pointer;border:0;background:var(--paper);width:100%;padding:20px 22px 18px;display:flex;justify-content:space-between;align-items:baseline;color:var(--ink)}
.strength-toggle-label{display:flex;gap:10px;align-items:baseline}
.strength-marker{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--fire);letter-spacing:.22em;font-weight:700;display:inline-block;min-width:34px}
.strength-title{font-family:"Oswald",sans-serif;font-size:22px;color:var(--ink);font-weight:700;text-transform:uppercase}
.strength-icon{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink2)}
.strength-body{display:none;background:var(--ink);color:var(--paper);border-top:1px solid var(--ink)}
.strength-body.open{display:block}

/* CONDITIONING WRAPPER (collapsible) */
.cond-wrap{background:var(--paper);border-bottom:1px solid var(--ink)}
.cond-toggle{appearance:none;cursor:pointer;border:0;background:transparent;width:100%;padding:20px 22px 18px;display:flex;justify-content:space-between;align-items:baseline;color:var(--ink)}
.cond-toggle-label{display:flex;gap:10px;align-items:baseline}
.cond-marker{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--fire);letter-spacing:.22em;font-weight:700;display:inline-block;min-width:34px}
.cond-title-hd{font-family:"Oswald",sans-serif;font-size:22px;color:var(--ink);font-weight:700;text-transform:uppercase}
.cond-icon{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink2)}
.cond-body-wrap{display:none;border-top:1px solid var(--rule)}
.cond-body-wrap.open{display:block}

/* SUPERSET */
.ss-group{border-bottom:2px solid rgba(241,236,223,.12)}
.ss-bracket-wrap{position:relative}
.ss-bracket{position:absolute;left:0;top:0;bottom:0;width:8px;background:var(--fire)}
.ss-inner{padding-left:8px}

/* BLOCK CAP (L2 headline — Filly category) */
.blk-cap{background:var(--paper);color:var(--ink);padding:44px 22px 16px}
.blk-cap.first{padding-top:28px}
.blk-cap-ttl{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--fire);text-transform:uppercase;border:1px solid var(--fire);padding:5px 9px 4px}
.blk-cap-sub{font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--fire);text-transform:uppercase;margin-top:10px}

/* EXERCISE CARD */
.ex-card{border-bottom:1px solid rgba(241,236,223,.12);background:var(--ink);color:var(--paper);overflow:hidden}
.ex-card:last-child{border-bottom:none}
.ex-card.bfr-inactive{opacity:.35}
.ex-pos{padding:26px 22px 14px}
.ex-eyebrow{display:flex;justify-content:space-between;align-items:baseline;font-family:"JetBrains Mono",monospace;font-size:9px;color:rgba(241,236,223,.55);letter-spacing:.2em;font-weight:700;margin-bottom:10px}
.ex-badge{color:var(--fire);font-weight:800}
.ex-name{font-family:"Oswald",sans-serif;font-size:36px;line-height:.9;color:var(--sky);font-style:italic;letter-spacing:-.025em;font-weight:700;text-transform:uppercase;overflow-wrap:break-word;word-break:break-word}
.ex-card-note{font-size:12px;font-style:italic;font-weight:400;color:var(--paper);opacity:.65;line-height:1.45;margin-top:8px}

/* PRESCRIPTION */
.ex-neg{background:var(--ink);color:var(--paper);padding:14px 22px 0;overflow:hidden}
.neg-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.28em;color:var(--paper);font-weight:700;opacity:.6}
.reps-hero{display:flex;align-items:baseline;line-height:.78;margin-top:4px;margin-bottom:16px;max-width:100%}
.reps-sets{font-family:"Oswald",sans-serif;font-size:100px;color:var(--sky);letter-spacing:-.08em;font-style:italic;font-weight:700}
.reps-x{font-family:"Oswald",sans-serif;font-size:48px;color:var(--fire);margin:0 -4px 0 22px;letter-spacing:0;align-self:center}
.reps-count{font-family:"Oswald",sans-serif;color:var(--sky);letter-spacing:-.08em;font-style:italic;font-weight:700}
.neg-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,.15)}
.neg-tempo-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--paper);letter-spacing:.2em;font-weight:700;opacity:.6}
.neg-tempo-val{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:800;color:var(--fire);letter-spacing:.06em;margin-top:2px}
.set-log-hdr{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.26em;color:var(--paper);font-weight:700;opacity:.6;padding:10px 0 4px;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.15);margin-top:10px}
.set-row{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:12px;padding:14px 0;border-top:1px solid rgba(255,255,255,.12)}
.set-cb{appearance:none;cursor:pointer;width:28px;height:28px;border-radius:0;border:2px solid var(--paper);background:transparent;color:var(--fire);font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.set-cb.done{background:var(--paper);color:var(--fire)}
.set-w-wrap{display:flex;align-items:baseline;gap:6px}
.set-w-inp{background:transparent;border:0;border-bottom:2px solid var(--paper);color:var(--paper);padding:2px 0;font-family:"Oswald",sans-serif;font-size:28px;font-weight:700;font-style:italic;letter-spacing:-.02em;width:90px;outline:none;border-radius:0;transition:border-color .1s, color .1s}
.set-w-inp.done{border-bottom-color:var(--fire);color:var(--fire)}
.set-w-inp::placeholder{color:rgba(255,255,255,.2)}
.set-kg{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--paper);letter-spacing:.1em;font-weight:700;opacity:.6;flex-shrink:0}
.set-reps{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--paper);letter-spacing:.04em;font-weight:700;opacity:.6;flex-shrink:0}
.ex-neg-pad{padding-bottom:52px}

/* CONDITIONING */
.cond-section{background:var(--paper)}
.cond-section + .cond-section{border-top:1px solid var(--rule)}
.cond-hero{background:var(--paper);color:var(--ink);padding:16px 22px 24px}
.cond-title{font-family:"Oswald",sans-serif;font-size:52px;line-height:.82;color:var(--sky);font-style:italic;letter-spacing:-.04em;font-weight:700;text-transform:uppercase;overflow-wrap:break-word;margin-bottom:12px}
.cond-body{font-size:14px;line-height:1.55;color:var(--ink);font-weight:600;margin-bottom:16px;opacity:.9}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;border:2px solid var(--ink)}
.cond-cell{padding:12px 14px}
.cond-cell:first-child{border-right:2px solid var(--ink)}
.cond-cell-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--ink2);letter-spacing:.2em;font-weight:700;opacity:.75}
.cond-cell-val{font-family:"Oswald",sans-serif;font-size:36px;color:var(--fire);font-style:italic;letter-spacing:-.03em;font-weight:700;margin-top:2px;line-height:1}
.cond-cell-mode{font-family:"Oswald",sans-serif;font-size:20px;color:var(--ink);font-weight:700;margin-top:4px;line-height:1.1}

/* MOBILITY */
.mob-section{background:var(--ink);color:var(--paper);padding:24px 18px 20px}
.mob-eyebrow{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--fire);letter-spacing:.2em;font-weight:700}
.mob-heading{font-family:"Oswald",sans-serif;font-size:58px;line-height:.82;margin:8px 0 20px;color:var(--sky);font-style:italic;letter-spacing:-.04em;font-weight:700;text-transform:uppercase;overflow-wrap:break-word}
.mob-heading span{color:var(--paper)}
.mob-list{border-top:2px solid var(--paper)}
.mob-row{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.13)}
.mob-n{font-family:"Oswald",sans-serif;font-size:40px;color:var(--sky);line-height:.9;font-style:italic;letter-spacing:-.04em;font-weight:700}
.mob-name{font-size:14px;color:var(--paper);font-weight:600;line-height:1.2}
.mob-reps{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--fire);font-weight:700;letter-spacing:.12em;margin-top:3px}

/* FOOTER */
.session-footer{padding:22px 18px;text-align:center;background:var(--paper);border-top:1px solid var(--rule)}
.footer-txt{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--ink2);letter-spacing:.28em;font-weight:700}

input[type=text]{-webkit-appearance:none}
</style>
</head>

<header id="appHeader"></header>
<main id="appMain"></main>

};
const lsSet=(k,v)=>localStorage.setItem(k,String(v));
const wKey=(d,s,ei,si)=>`rb_${d}_${s}_${ei}_${si}`;
const getW=(d,s,ei,si)=>localStorage.getItem(wKey(d,s,ei,si))||'';

// ── HELPERS ──────────────────────────────────────────────────────────────────
function parseW(str){
  if(!str||str==='–')return{sets:0,reps:'–',inactive:true};
  const xi=str.indexOf('×');
  if(xi<0)return{sets:1,reps:str,inactive:false};
  return{sets:parseInt(str.slice(0,xi))||1,reps:str.slice(xi+1),inactive:false};
}
function tri(){return`<svg width="8" height="10" viewBox="0 0 8 10"><path d="M1 1l6 4-6 4V1z" fill="currentColor"/></svg>`;}
function vidBtn(url,large){
  if(!url)return'';
  if(large)return`<a href="${url}" target="_blank" rel="noopener" class="vid-btn">${tri()}<span>VIDEO</span></a>`;
  return`<a href="${url}" target="_blank" rel="noopener" class="vid-btn vid-sm">${tri()}</a>`;
}
function condFmt(text){
  const t=text.toUpperCase();
  if(t.startsWith('EMOM'))return'EMOM';
  if(t.startsWith('AMRAP'))return'AMRAP';
  if(t.includes('FOR QUALITY'))return'FOR QUALITY';
  const m=t.match(/^(\d+)\s*RUNDEN/);if(m)return m[1]+' ROUNDS';
  const m2=t.match(/^(\d+)\s*[×X]/);if(m2)return'INTERVALS';
  return'CONDITIONING';
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function renderSetRows(dayId,secId,exIdx,parsed){
  if(parsed.inactive)return'';
  let out='';
  for(let i=0;i<parsed.sets;i++){
    const k=wKey(dayId,secId,exIdx,i);
    const dk=k+'_d';
    const isDone=S.done[dk]||false;
    const wv=getW(dayId,secId,exIdx,i);
    out+=`<div class="set-row">
      <button class="set-cb${isDone?' done':''}" data-act="toggle-set" data-dk="${dk}" data-ik="${k}" type="button">${isDone?'✓':i+1}</button>
      <div class="set-w-wrap">
        <input class="set-w-inp${isDone?' done':''}" type="text" inputmode="decimal" placeholder="___" data-wk="${k}" value="${wv}" autocomplete="off" autocorrect="off" autocapitalize="off">
        <span class="set-kg">KG</span>
      </div>
      <span class="set-reps">× ${parsed.reps}</span>
    </div>`;
  }
  return out;
}

function renderExCard(ex,dayId,secId,exIdx,badge){
  const wStr=ex.w[S.week-1];
  const p=parseW(wStr);
  const rl=String(p.reps).length;
  const rf=rl>6?'52px':rl>4?'72px':'100px';
  const isBfr=DAYS[dayId].sections.find(s=>s.id===secId)?.bfr||false;
  return`<article class="ex-card${p.inactive?' bfr-inactive':''}">
    <div class="ex-pos">
      <div class="ex-eyebrow">
        <span>${badge?`<span class="ex-badge">${badge}</span> · `:''}${p.inactive?'AB WOCHE 3':wStr}</span>

function renderCond(sec,weekIdx){
  const w=sec.weeks[weekIdx];
  const fmt=condFmt(w.text);
  const note=w.note||sec.note||'';
  return`<section class="cond-section">
    ${note?`<div class="sec-note" style="padding-top:14px">${note}</div>`:''}
    <div class="cond-hero">
      <h2 class="cond-title">${fmt}</h2>
      <p class="cond-body">${w.text}</p>
      <div class="cond-grid">
        <div class="cond-cell"><div class="cond-cell-lbl">DURATION</div><div class="cond-cell-val">${w.dur}</div></div>
        <div class="cond-cell"><div class="cond-cell-lbl">FORMAT</div><div class="cond-cell-mode">${fmt}</div></div>
      </div>
    </div>
  </section>`;
}

function renderSection(sec,dayId,weekIdx){
  if(sec.cond)return renderCond(sec,weekIdx);
  const exHtml=sec.exercises.map((ex,ei)=>{
    const badge=sec.superset?String.fromCharCode(65+ei):null;
    return renderExCard(ex,dayId,sec.id,ei,badge);
  }).join('');
  if(sec.superset){
    return`<section class="ss-group">
      <div class="ss-bracket-wrap"><div class="ss-bracket"></div><div class="ss-inner">${sec.note?`<div class="sec-note">${sec.note}</div>`:''}${exHtml}</div></div>
    </section>`;
  }
  return`<section>
    ${sec.note?`<div class="sec-note" style="padding-top:14px">${sec.note}</div>`:''}
    ${exHtml}
  </section>`;
}

    <div class="phase-eye"><span>PHASE DOSSIER</span><span>WEEK 0${S.week} / 06</span></div>
    <div class="phase-heading">${phases[wi]}<span class="ph-fire"> ·0${S.week}</span></div>
    ${isDeload?`<div class="deload-notice">⚠ DELOAD — 50 % VOLUMEN · TECHNIK-FOKUS</div>`:''}
    <div class="phase-pills">
      <span class="phase-pill pill-rpe">${ph.rpe}</span>
      <span class="phase-pill pill-focus">${ph.focus}</span>
    </div>
  </div>`;
}

// ── FULL RENDER ───────────────────────────────────────────────────────────────
function renderHeader(){
  const now=new Date();
  const dd=String(now.getDate()).padStart(2,'0');
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const yy=String(now.getFullYear()).slice(2);
  const dn=['SO','MO','DI','MI','DO','FR','SA'][now.getDay()];
  const wkBtns=[1,2,3,4,5,6].map(w=>`<button class="wk-btn${S.week===w?' active':''}" data-act="set-week" data-w="${w}" type="button"><span class="wk-sub">Wk</span>${w}</button>`).join('');
  const dayBtns=DAY_TABS.map(d=>`<button class="day-btn${S.day===d.id?' active':''}" data-act="set-day" data-d="${d.id}" type="button"><span class="day-lbl">${d.label}</span><span class="day-sub">${d.sub}</span></button>`).join('');
  document.getElementById('appHeader').innerHTML=`
    <div class="hdr-dateline"><span>NO. 0${S.week} · VOL. VI</span><span>${dn} / ${dd}.${mm}.${yy}</span></div>
    <div class="hdr-wordmark">REBUILD<span>°</span></div>
    <div class="hdr-tagline">— A TRAINING LEDGER —</div>
    <div class="hdr-rule"></div>
    <div class="week-rail">${wkBtns}</div>
    <div class="hdr-rule-thin"></div>
    <div class="day-tabs">${dayBtns}</div>`;
}

function renderMain(){
  const d=DAYS[S.day];
  const wi=S.week-1;
  let html='';
  if(d.mob){
    html+=renderMob(d);
  } else {
    html+=renderPhase(wi);
    html+=renderPrehab(S.day);
    const strengthSecs=d.sections.filter(s=>!s.cond);
    const condSecs=d.sections.filter(s=>s.cond);
    if(strengthSecs.length){
      const catLbl={intensity:'Strength Intensity',balance:'Strength Balance',accessory:'Strength Accessory',bfr:'BFR Option'};
      let strBody='';
      for(let i=0;i<strengthSecs.length;i++){
        const sec=strengthSecs[i];
        const title=catLbl[sec.cat]||'Strength';
        const sub=sec.superset?'Superset · Back-to-back · 90s Rest':'';
        strBody+=`<div class="blk-cap${i===0?' first':''}"><div class="blk-cap-ttl">${title}</div>${sub?`<div class="blk-cap-sub">${sub}</div>`:''}</div>`;
        strBody+=renderSection(sec,S.day,wi);
      }
      html+=`<div class="strength-wrap">
        <button class="strength-toggle" data-act="toggle-str" type="button">
          <span class="strength-toggle-label">
            <span class="strength-marker">II</span>
            <span class="strength-title">Strength</span>
          </span>
          <span class="strength-icon">${S.strOpen?'[−]':'[+]'}</span>
        </button>
        <div class="strength-body${S.strOpen?' open':''}">${strBody}</div>
      </div>`;
    }
    if(condSecs.length){
      const condBody=condSecs.map(sec=>renderSection(sec,S.day,wi)).join('');
      html+=`<div class="cond-wrap">
        <button class="cond-toggle" data-act="toggle-co" type="button">
          <span class="cond-toggle-label">
            <span class="cond-marker">III</span>
            <span class="cond-title-hd">Conditioning</span>
          </span>
          <span class="cond-icon">${S.coOpen?'[−]':'[+]'}</span>
        </button>
        <div class="cond-body-wrap${S.coOpen?' open':''}">${condBody}</div>
      </div>`;
    }
  }
  const now=new Date();
  html+=`<div class="session-footer"><div class="footer-txt">— FIN · W0${S.week} · ${S.day} · ${now.getFullYear()} —</div></div>`;
  document.getElementById('appMain').innerHTML=html;
}

function render(){renderHeader();renderMain();}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-act]');
  if(!btn)return;
  const act=btn.dataset.act;
  if(act==='set-week'){
    S.week=parseInt(btn.dataset.w);
    lsSet('rb_week',S.week);
    render();window.scrollTo(0,0);
  } else if(act==='set-day'){
    S.day=btn.dataset.d;
    lsSet('rb_day',S.day);
    render();window.scrollTo(0,0);
  } else if(act==='toggle-ph'){
    S.phOpen=!S.phOpen;
    lsSet('rb_ph',S.phOpen?'1':'0');
    document.querySelector('.prehab-body')?.classList.toggle('open',S.phOpen);
    document.querySelector('.prehab-icon').textContent=S.phOpen?'[−]':'[+]';
  } else if(act==='toggle-str'){
    S.strOpen=!S.strOpen;
    lsSet('rb_str',S.strOpen?'1':'0');
    document.querySelector('.strength-body')?.classList.toggle('open',S.strOpen);
    document.querySelector('.strength-icon').textContent=S.strOpen?'[−]':'[+]';
  } else if(act==='toggle-co'){
    S.coOpen=!S.coOpen;
    lsSet('rb_co',S.coOpen?'1':'0');
    document.querySelector('.cond-body-wrap')?.classList.toggle('open',S.coOpen);
    document.querySelector('.cond-icon').textContent=S.coOpen?'[−]':'[+]';
  } else if(act==='toggle-set'){
    const dk=btn.dataset.dk;
    const ik=btn.dataset.ik;
    S.done[dk]=!S.done[dk];
    const done=S.done[dk];
    btn.classList.toggle('done',done);
    btn.textContent=done?'✓':parseInt(ik.split('_').pop())+1;
    const inp=document.querySelector(`input[data-wk="${ik}"]`);
    if(inp)inp.classList.toggle('done',done);
  }
});

document.addEventListener('input',e=>{
  const inp=e.target;
  if(inp.dataset.wk)localStorage.setItem(inp.dataset.wk,inp.value);
});

render();
</script>
</body>
</html>
