<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>Knie Rehab</title>
<style>
  @font-face {
    font-family: 'ImageFuture';
    src: url('ImageFuture-SemiBold.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --purple: #C8A2E8;
    --green: #A8E6A3;
    --yellow: #F5E190;
    --orange: #F58D2D;
    --blue: #93C5FD;
    --pink: #F9A8D4;
    --text: #1A1A1A;
    --text2: #888;
    --bg: #fff;
    --card: #F5F5F5;
    --card2: #EBEBEB;
    --r: 24px;
    --gap: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 calc(80px + env(safe-area-inset-bottom)) 0;
    -webkit-font-smoothing: antialiased;
  }

  .hl {
    font-family: 'ImageFuture', 'Inter', sans-serif;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* Hero */
  .hero { margin-bottom: 28px; }
  .hero h1 {
    font-size: clamp(52px, 13vw, 76px);
    line-height: 0.92;
    margin-bottom: 14px;
  }
  .hero-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text2);
    font-weight: 500;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--yellow);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 13px;
  }
  .badge svg { width: 13px; height: 13px; }

  /* Nav */
  .nav {
    display: flex;
    gap: var(--gap);
    margin-bottom: 20px;
  }
  .nav button {
    flex: 1;
    padding: 14px 8px;
    border-radius: var(--r);
    border: none;
    font-family: 'ImageFuture', sans-serif;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
    transition: transform 0.12s;
  }
  .nav button:active { transform: scale(0.97); }
  .nav .on { background: var(--text); color: #fff; }
  .nav .off { background: #F0F0F0; }

  /* Info Block */
  .info {
    background: var(--blue);
    border-radius: var(--r);
    padding: 18px 20px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.55;
  }
  .info b { display: block; margin-bottom: 3px; font-size: 14px; }

  /* Phase */
  .phase { margin-bottom: var(--gap); }
  .phase-head {
    border-radius: var(--r);
    padding: 18px 22px;
    margin-bottom: var(--gap);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .phase-head h2 {
    font-size: clamp(26px, 7vw, 34px);
    line-height: 1;
  }
  .phase-head span {
    font-size: 14px;
    font-weight: 600;
    opacity: 0.5;
  }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--r);
    margin-bottom: var(--gap);
    overflow: hidden;
  }
  .card.done { opacity: 0.35; }
  .card.done .cname { text-decoration: line-through; }

  .ctop {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .chk {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #E0E0E0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .chk svg { opacity: 0; }
  .chk.on { background: var(--text); }
  .chk.on svg { opacity: 1; }

  .cname { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .csub { font-size: 12px; color: var(--text2); margin-top: 1px; font-weight: 500; }

  .cchev {
    margin-left: auto;
    flex-shrink: 0;
    color: #CCC;
    transition: transform 0.2s;
  }
  .cchev.open { transform: rotate(180deg); }

  /* Detail */
  .cdet { display: none; padding: 0 18px 18px; }
  .cdet.open { display: block; }

  .cbox {
    background: var(--card2);
    border-radius: 16px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.55;
    color: #555;
    margin-bottom: 12px;
  }
  .cbox strong { color: var(--text); }

  .csteps {
    font-size: 13px;
    line-height: 1.6;
    padding-left: 18px;
    margin-bottom: 14px;
    color: #555;
  }
  .csteps li { margin-bottom: 3px; }
  .csteps li::marker { color: #CCC; }

  /* Timer */
  .tmr {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    background: var(--card2);
    border-radius: 16px;
    padding: 10px 14px;
  }
  .tmr-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .tmr-btn:active { transform: scale(0.95); }
  .tmr-btn.run { background: #DC2626; }
  .tmr-btn svg { width: 11px; height: 11px; }
  .tmr-time {
    font-family: 'ImageFuture', sans-serif;
    font-size: 26px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .tmr-tot { font-size: 12px; color: var(--text2); margin-left: auto; }

  /* Video */
  .vid {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    border-radius: 16px;
    overflow: hidden;
    background: #E0E0E0;
  }
  .vid iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Bottom bar */
  .bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bottombar.hidden { display: none; }
  .binner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btrack {
    flex: 1;
    height: 6px;
    background: #EAEAEA;
    border-radius: 3px;
    overflow: hidden;
  }
  .bfill {
    height: 100%;
    background: var(--text);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .blabel {
    font-size: 14px;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }

  /* Reset */
  .rst {
    display: flex;
    width: 100%;
    margin: 12px 0;
    padding: 14px;
    background: #F0F0F0;
    border: none;
    border-radius: var(--r);
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .rst svg { width: 14px; height: 14px; }

  .disc {
    font-size: 11px;
    color: #CCC;
    text-align: center;
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ===== HUB STYLES ===== */

  .hub-section {
    margin-bottom: 20px;
  }
  .hub-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
    margin-bottom: 10px;
  }

  /* Readiness */
  .rdy-card {
    background: var(--card);
    border-radius: var(--r);
    padding: 18px 20px;
    margin-bottom: var(--gap);
  }
  .rdy-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .rdy-row:last-child { margin-bottom: 0; }
  .rdy-label {
    font-size: 14px;
    font-weight: 600;
    min-width: 80px;
  }
  .rdy-dots {
    display: flex;
    gap: 6px;
  }
  .rdy-dot {
    width: 36px; height: 36px;
    border-radius: 12px;
    border: none;
    background: var(--card2);
    font-size: 14px;
    font-weight: 700;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .rdy-dot:active { transform: scale(0.9); }
  .rdy-dot.on {
    color: #fff;
  }
  .rdy-dot.on.c-green { background: #6BC46A; }
  .rdy-dot.on.c-yellow { background: #E8C840; }
  .rdy-dot.on.c-orange { background: var(--orange); }
  .rdy-dot.on.c-red { background: #DC2626; }
  .rdy-val {
    font-family: 'ImageFuture', sans-serif;
    font-size: 18px;
    font-weight: 600;
    min-width: 24px;
    text-align: right;
  }

  /* Chart card */
  .chart-card {
    background: var(--card);
    border-radius: var(--r);
    padding: 18px 20px;
    margin-bottom: var(--gap);
  }
  .chart-card svg {
    width: 100%;
    display: block;
  }
  .chart-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .chart-sub {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 14px;
  }

  /* Body parts */
  .bp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--gap);
  }
  .bp-card {
    border-radius: var(--r);
    padding: 16px 14px;
    text-align: center;
  }
  .bp-name {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .bp-load {
    font-family: 'ImageFuture', sans-serif;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .bp-unit {
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    font-weight: 500;
  }
  .bp-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* Session list */
  .sess-card {
    background: var(--card);
    border-radius: var(--r);
    padding: 16px 18px;
    margin-bottom: var(--gap);
  }
  .sess-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .sess-type {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 10px;
    border-radius: 100px;
  }
  .sess-date {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }
  .sess-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .sess-meta {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }
  .sess-del {
    background: none;
    border: none;
    color: #CCC;
    cursor: pointer;
    padding: 4px;
    font-size: 18px;
    line-height: 1;
  }
  .sess-del:active { color: #DC2626; }

  /* HR Zones bar */
  .zones-bar {
    margin-top: 10px;
  }
  .zones-bar svg { height: 24px; }
  .zones-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .zones-legend span {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .zones-legend .zd {
    width: 8px; height: 8px;
    border-radius: 2px;
    display: inline-block;
  }

  /* Add button */
  .add-btn {
    display: flex;
    width: 100%;
    padding: 14px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: var(--gap);
    transition: transform 0.12s;
  }
  .add-btn:active { transform: scale(0.97); }
  .add-btn.sec {
    background: #F0F0F0;
    color: var(--text);
  }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: #fff;
    border-radius: var(--r) var(--r) 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .modal-close {
    float: right;
    background: var(--card);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Form fields */
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text2);
  }
  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #EAEAEA;
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 500;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--text);
  }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field-row3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .field-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .field-pill {
    padding: 8px 16px;
    border-radius: 100px;
    border: 2px solid #EAEAEA;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    transition: all 0.12s;
  }
  .field-pill:active { transform: scale(0.95); }
  .field-pill.on {
    border-color: var(--text);
    background: var(--text);
    color: #fff;
  }

  /* Strength exercises in form */
  .ex-entry {
    background: var(--card);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .ex-entry-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ex-entry-top input {
    flex: 1;
    padding: 8px 10px;
    border: 2px solid #EAEAEA;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .ex-entry-top input:focus { border-color: var(--text); }
  .ex-rm {
    background: none;
    border: none;
    color: #CCC;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  /* Donut */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .donut-legend {
    flex: 1;
  }
  .donut-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 500;
  }
  .donut-legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .donut-legend-val {
    margin-left: auto;
    font-weight: 700;
    font-family: 'ImageFuture', sans-serif;
    font-size: 14px;
  }

  /* Sparkline readiness */
  .spark-row {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 20px;
    margin-top: 4px;
  }
  .spark-bar {
    flex: 1;
    border-radius: 2px;
    min-height: 2px;
  }
</style>
</head>

<div class="container" id="app"></div>

<div class="bottombar" id="bb">
  <div class="binner">

    <div class="blabel" id="bl">0/0</div>
  </div>
</div>

<div class="modal-overlay" id="modal"></div>

function tmr(k,s){
  if(S.t[k]&&S.t[k].iv){clearInterval(S.t[k].iv);delete S.t[k];render();return;}
  S.t[k]={rem:s,iv:setInterval(()=>{

      clearInterval(S.t[k].iv);
      try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=800;g.gain.value=0.3;o.start();setTimeout(()=>{o.stop();c.close();},300);}catch(e){}
      delete S.t[k];render();return;

  },1000)};

}

// === Date helpers ===
function ds(d){ return d.toISOString().split('T')[0]; }
function today(){ return ds(new Date()); }
function weekStart(){
  const d=new Date(); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.setDate(diff));
}
function getWeekDays(){
  const ws=weekStart(); const days=[];
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(ds(d));}
  return days;
}
function fmtDate(s){
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
}
function dayName(s){
  const d=new Date(s+'T12:00:00');
  return DAYS[((d.getDay()+6)%7)];
}

// === Load calculations ===
function weekSessions(){
  const days=getWeekDays();
  return LD.sessions.filter(s=>days.includes(s.date));
}

function dailyLoads(){
  const days=getWeekDays();
  const loads={};
  days.forEach(d=>loads[d]=0);
  weekSessions().forEach(s=>{
    const srpe=(s.rpe||5)*(s.duration||30);
    loads[s.date]=(loads[s.date]||0)+srpe;
  });
  return loads;
}

function bpWeekVolume(){
  const vol={knie:0,schulter:0,hws:0,allgemein:0};
  weekSessions().filter(s=>s.type==='strength').forEach(s=>{
    const bp=s.bodyPart||'allgemein';
    if(s.exercises){
      s.exercises.forEach(ex=>{
        vol[bp]+=(ex.sets||0)*(ex.reps||0)*(ex.weight||0);
      });
    }
  });
  return vol;
}

function bpStatus(vol){
  if(vol===0) return {color:'#E0E0E0',label:'--'};
  if(vol<2000) return {color:'#6BC46A',label:'Leicht'};
  if(vol<5000) return {color:'#E8C840',label:'Moderat'};
  if(vol<8000) return {color:'var(--orange)',label:'Hoch'};
  return {color:'#DC2626',label:'Sehr hoch'};
}

function weekTotalLoad(){
  let t=0;
  weekSessions().forEach(s=>t+=(s.rpe||5)*(s.duration||30));
  return t;
}

function rdyColor(key, val){
  if(key==='soreness'){
    if(val<=2) return 'c-green';
    if(val<=3) return 'c-yellow';
    if(val<=4) return 'c-orange';
    return 'c-red';
  }
  if(val>=4) return 'c-green';
  if(val>=3) return 'c-yellow';
  if(val>=2) return 'c-orange';
  return 'c-red';
}

function rdyAvg(){
  const r=LD.readiness[today()];
  if(!r||(!r.sleep&&!r.soreness&&!r.mood)) return null;
  const sl=r.sleep||3, so=r.soreness||3, mo=r.mood||3;
  return Math.round(((sl+(6-so)+mo)/3)*10)/10;
}

// === SVG Charts ===
function svgBarChart(loads){
  const days=getWeekDays();
  const vals=days.map(d=>loads[d]||0);
  const max=Math.max(...vals,100);
  const w=320, h=140, bw=32, gap=14, ox=0, oy=10;
  const totalW=7*bw+6*gap;
  const startX=(w-totalW)/2;

  let svg=`<svg viewBox="0 0 ${w} ${h+30}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines
  for(let i=0;i<=4;i++){
    const y=oy+h-(h*i/4);
    svg+=`<line x1="${startX}" y1="${y}" x2="${startX+totalW}" y2="${y}" stroke="#EAEAEA" stroke-width="1"/>`;
  }

  // Bars
  days.forEach((d,i)=>{
    const v=vals[i];
    const bh=max>0?(v/max)*h:0;
    const x=startX+i*(bw+gap);
    const y=oy+h-bh;
    const isToday=d===today();
    const col=isToday?'var(--text)':'#D4D4D4';
    const r=Math.min(6,bh/2);

    if(bh>0){
      svg+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="${r}" fill="${col}"/>`;
    }
    if(v>0){
      svg+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--text)" font-family="Inter,sans-serif">${v}</text>`;
    }
    // Day label
    const dn=dayName(d);
    svg+=`<text x="${x+bw/2}" y="${oy+h+16}" text-anchor="middle" font-size="11" fill="${isToday?'var(--text)':'#AAA'}" font-weight="${isToday?'700':'500'}" font-family="Inter,sans-serif">${dn}</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

function svgZonesBar(zones){
  const total=Object.values(zones).reduce((a,b)=>a+b,0);
  if(total===0) return '';
  const w=300, h=20, r=6;

  let svg=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  let x=0;
  const keys=['z1','z2','z3','z4','z5'];
  keys.forEach((k,i)=>{
    const v=zones[k]||0;
    if(v===0) return;
    const bw=(v/total)*w;
    const rx=i===0?`${r}`:0;
    const isLast=keys.slice(i+1).every(kk=>(zones[kk]||0)===0);
    svg+=`<rect x="${x}" y="0" width="${bw}" height="${h}" fill="${ZC[k]}" rx="${i===0||isLast?r:0}"/>`;
    if(bw>24){
      svg+=`<text x="${x+bw/2}" y="${h/2+1}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="700" fill="rgba(0,0,0,0.5)" font-family="Inter,sans-serif">${v}m</text>`;
    }
    x+=bw;
  });
  svg+=`</svg>`;
  return svg;
}

function svgDonut(data, size){
  // data: [{label, value, color}]
  const total=data.reduce((a,b)=>a+b.value,0);
  if(total===0) return '';
  const cx=size/2, cy=size/2, r=size/2-12, sw=10;
  const circ=2*Math.PI*r;
  let offset=0;

  let svg=`<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  // Background ring
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EAEAEA" stroke-width="${sw}"/>`;

  data.forEach(d=>{
    if(d.value===0) return;
    const pct=d.value/total;
    const dash=pct*circ;
    const gap=circ-dash;
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>`;
    offset+=dash;
  });

  // Center text
  svg+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="18" font-weight="700" fill="var(--text)" font-family="ImageFuture,Inter,sans-serif">${total}</text>`;
  svg+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="9" fill="var(--text2)" font-family="Inter,sans-serif">sRPE</text>`;
  svg+=`</svg>`;
  return svg;
}

function svgSparkline(values, color){
  const h=20, bw=4, gap=2;
  const w=values.length*(bw+gap);
  const max=Math.max(...values,5);
  let svg=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:${w}px;height:${h}px">`;
  values.forEach((v,i)=>{
    const bh=max>0?(v/max)*h:2;
    svg+=`<rect x="${i*(bw+gap)}" y="${h-bh}" width="${bw}" height="${Math.max(bh,2)}" rx="1.5" fill="${v>0?color:'#E0E0E0'}"/>`;
  });
  svg+=`</svg>`;
  return svg;
}

  h+=`<div class="hub-section"><div class="hub-section-title">Wochen-Load (sRPE)</div>`;
  h+=`<div class="chart-card">`;
  h+=`<div class="donut-wrap"><div style="width:100px;flex-shrink:0">${svgDonut([
    {label:'Kardio',value:ws.filter(s=>s.type==='cardio').reduce((a,s)=>(s.rpe||5)*(s.duration||30)+a,0),color:CM.blue},
    {label:'Kraft',value:ws.filter(s=>s.type==='strength').reduce((a,s)=>(s.rpe||5)*(s.duration||30)+a,0),color:CM.green}
  ],100)}</div>`;
  h+=`<div class="donut-legend">`;
  h+=`<div class="donut-legend-item"><span class="donut-legend-dot" style="background:${CM.blue}"></span>Kardio<span class="donut-legend-val">${ws.filter(s=>s.type==='cardio').reduce((a,s)=>(s.rpe||5)*(s.duration||30)+a,0)}</span></div>`;
  h+=`<div class="donut-legend-item"><span class="donut-legend-dot" style="background:${CM.green}"></span>Kraft<span class="donut-legend-val">${ws.filter(s=>s.type==='strength').reduce((a,s)=>(s.rpe||5)*(s.duration||30)+a,0)}</span></div>`;
  h+=`</div></div>`;
  h+=`<div style="margin-top:16px">${svgBarChart(loads)}</div>`;
  h+=`</div></div>`;

  // Body Part Status
  h+=`<div class="hub-section"><div class="hub-section-title">Korperteil-Status</div>`;
  h+=`<div class="bp-grid">`;
  Object.entries(BPN).forEach(([k,v])=>{
    if(k==='allgemein') return;
    const vol=bpVol[k];
    const st=bpStatus(vol);
    h+=`<div class="bp-card" style="background:${BPC[k]}">`;
    h+=`<div class="bp-name">${v}</div>`;
    h+=`<div class="bp-load">${vol>0?formatVol(vol):'--'}</div>`;
    h+=`<div class="bp-unit"><span class="bp-dot" style="background:${st.color}"></span>${st.label}</div>`;
    h+=`</div>`;
  });
  h+=`</div></div>`;

  // Add session buttons
  h+=`<div class="hub-section">`;
  h+=`<button class="add-btn" onclick="openCardioForm()">${I.plus} Kardio Session</button>`;
  h+=`<button class="add-btn sec" onclick="openStrengthForm()">${I.plus} Kraft Session</button>`;
  h+=`</div>`;

  // Recent Sessions
  const recent=LD.sessions.slice().sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).slice(0,10);
  if(recent.length>0){
    h+=`<div class="hub-section"><div class="hub-section-title">Sessions</div>`;
    recent.forEach((s,ri)=>{
      const idx=LD.sessions.indexOf(s);
      const srpe=(s.rpe||5)*(s.duration||30);
      const isCardio=s.type==='cardio';
      h+=`<div class="sess-card">`;
      h+=`<div class="sess-top"><span class="sess-type" style="background:${isCardio?CM.blue:CM.green}">${isCardio?'Kardio':'Kraft'}</span>`;
      h+=`<span class="sess-date">${fmtDate(s.date)}</span>`;
      h+=`<button class="sess-del" onclick="if(confirm('Session loschen?'))delSession(${idx})">&times;</button></div>`;
      h+=`<div class="sess-title">${s.name||'Session'}</div>`;
      h+=`<div class="sess-meta">${s.duration} Min · RPE ${s.rpe} · sRPE ${srpe}`;
      if(isCardio&&s.avgHR) h+=` · ${s.avgHR} bpm`;
      if(!isCardio&&s.bodyPart) h+=` · ${BPN[s.bodyPart]||s.bodyPart}`;
      h+=`</div>`;

      // Cardio: HR zones bar
      if(isCardio&&s.zones){
        const zTotal=Object.values(s.zones).reduce((a,b)=>a+b,0);
        if(zTotal>0){
          h+=`<div class="zones-bar">${svgZonesBar(s.zones)}`;
          h+=`<div class="zones-legend">`;
          ['z1','z2','z3','z4','z5'].forEach((z,i)=>{
            if(s.zones[z]>0) h+=`<span><span class="zd" style="background:${ZC[z]}"></span>Z${i+1}: ${s.zones[z]}m</span>`;
          });
          h+=`</div></div>`;
        }
      }

      // Strength: exercise list
      if(!isCardio&&s.exercises&&s.exercises.length>0){
        let totalVol=0;
        h+=`<div style="margin-top:8px">`;
        s.exercises.forEach(ex=>{
          const v=ex.sets*ex.reps*ex.weight;
          totalVol+=v;
          h+=`<div style="display:flex;justify-content:space-between;font-size:12px;color:#666;padding:2px 0"><span>${ex.name}</span><span>${ex.sets}x${ex.reps} @ ${ex.weight}kg = ${formatVol(v)}</span></div>`;
        });
        h+=`<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding-top:4px;border-top:1px solid #E0E0E0;margin-top:4px"><span>Volume Load</span><span>${formatVol(totalVol)}</span></div>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`<p class="disc">Lokale Daten. Kein Export. Alle Angaben manuell.</p>`;
  return h;
}

function formatVol(v){
  if(v>=1000) return (v/1000).toFixed(1)+'k';
  return v.toString();
}

function getWeekNumber(){
  const d=new Date();
  const start=new Date(d.getFullYear(),0,1);
  const diff=(d-start+(start.getTimezoneOffset()-d.getTimezoneOffset())*60000);
  const oneWeek=604800000;
  return Math.ceil((diff/oneWeek)+0.5);
}

function renderNav(){
  let h='<div class="nav">';
  const tabs=[['daily','Alltag'],['training','Training'],['hub','Hub']];
  tabs.forEach(([k,v])=>{
    h+=`<button class="${S.p===k?'on':'off'} hl" onclick="sp('${k}')">${v}</button>`;
  });
  h+='</div>';
  return h;
}

// === Main Render ===
function render(){
  const app=document.getElementById('app');
  const bb=document.getElementById('bb');

  if(S.p==='hub'){
    bb.classList.add('hidden');
    app.innerHTML=renderHub();
    return;
  }

  bb.classList.remove('hidden');
  const prog=P[S.p], d=dn(), t=tot(), pct=t?Math.round(d/t*100):0;
  document.getElementById('bf').style.width=pct+'%';
  document.getElementById('bl').textContent=d+'/'+t;

  let h='<div class="hero"><h1 class="hl">Knie<br>Rehab</h1><div class="hero-row">';
  h+='<div class="badge">'+I.fire+' '+S.streak+' Tage</div>';
  h+='<span>15-20 Min</span></div></div>';

  h+=renderNav();

  h+='<div class="info"><b>MRT 18.02.2026</b>Grad-4-Knorpeldefekte retropatellar (med. Facette) + zentrale Trochlea femoris. Subchondrales Knochenmarksodem. Baker-Zyste. Vernarbtes Gewebe oberhalb inneres Knie.</div>';

  prog.phases.forEach((ph,pi)=>{
    h+='<div class="phase"><div class="phase-head" style="background:'+CM[ph.color]+'">';
    h+='<h2 class="hl">'+ph.name+'</h2><span>'+ph.time+'</span></div>';
    ph.exercises.forEach((ex,ei)=>{
      const k=id(pi,ei), done=!!S.d[k], open=!!S.o[k];
      const ta=S.t[k]&&S.t[k].iv, tr=S.t[k]?S.t[k].rem:ex.timer;
      h+='<div class="card'+(done?' done':'')+'">';
      h+='<div class="ctop" onclick="exp('+pi+','+ei+')">';
      h+='<div class="chk'+(done?' on':'')+'" onclick="event.stopPropagation();tog('+pi+','+ei+')">'+I.chk+'</div>';
      h+='<div><div class="cname">'+ex.name+'</div><div class="csub">'+ex.meta+'</div></div>';
      h+='<div class="cchev'+(open?' open':'')+'">'+I.chv+'</div></div>';
      h+='<div class="cdet'+(open?' open':'')+'">';
      h+='<div class="cbox">'+ex.why+'</div>';
      h+='<ol class="csteps">';ex.steps.forEach(s=>h+='<li>'+s+'</li>');h+='</ol>';
      if(ex.timer>0){
        h+='<div class="tmr"><button class="tmr-btn'+(ta?' run':'')+'" onclick="tmr(\''+k+'\','+ex.timer+')">'+(ta?I.stop+' Stop':I.play+' Start')+'</button>';
        h+='<div class="tmr-time" id="t-'+k+'">'+fmt(tr||ex.timer)+'</div>';
        h+='<div class="tmr-tot">'+fmt(ex.timer)+'</div></div>';
      }
      h+='<div class="vid"><iframe src="https://www.youtube.com/embed/'+ex.vid+'" allowfullscreen loading="lazy"></iframe></div>';
      h+='</div></div>';
    });
    h+='</div>';
  });

  h+='<button class="rst" onclick="res()">'+I.rst+' Tag zurucksetzen</button>';
  h+='<p class="disc">Kein Ersatz fur arztliche Beratung. Ubungen schmerzfrei ausfuhren.</p>';
  app.innerHTML=h;
}
render();
</script>
</body>
</html>
